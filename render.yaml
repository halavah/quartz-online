services:
  - type: web
    name: quartz-online
    runtime: node
    region: singapore
    plan: free
    branch: master
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
