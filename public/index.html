<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechHub - 探索前沿技术，提升开发效率</title>
    <meta name="description" content="TechHub 是一个专注于前沿技术分享的平台，涵盖 AI、前端、工具等多个领域，助力开发者提升效率。">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0066ff;
            --secondary-color: #00d4ff;
            --accent-color: #ff6b00;
            --dark-bg: #0a0e27;
            --card-bg: #1a1f3a;
            --text-color: #e8eaed;
            --text-secondary: #9aa0a6;
            --border-color: #2a2f4a;
            --success-color: #00c853;
            --warning-color: #ff9800;
            --info-color: #0ea5e9;
            --error-color: #ef4444;
            --gradient-primary: linear-gradient(135deg, #0066ff 0%, #00d4ff 100%);
            --gradient-hero: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            --shadow-glow: 0 0 30px rgba(0, 102, 255, 0.3);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--dark-bg);
            overflow-x: hidden;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        /* 英雄区域 */
        .hero-section {
            background: var(--gradient-hero);
            padding: 10rem 2rem 6rem;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(0, 102, 255, 0.2);
            color: var(--secondary-color);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(0, 212, 255, 0.3);
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 统计数据 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin: 0 auto;
            max-width: 800px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        /* 分类区域 */
        .categories-section {
            padding: 5rem 2rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .section-subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .category-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-glow);
        }

        .category-card:hover::before {
            transform: scaleX(1);
        }

        .category-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .category-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .category-count {
            color: var(--text-secondary);
        }

        /* 最新文章 */
        .articles-section {
            padding: 5rem 2rem;
            background: rgba(0, 102, 255, 0.05);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 3rem auto 0;
        }

        .article-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .article-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .article-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-glow);
        }

        .article-card:hover::before {
            transform: scaleX(1);
        }

        .article-category {
            display: inline-block;
            background: rgba(0, 102, 255, 0.2);
            color: var(--secondary-color);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .article-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .article-description {
            color: var(--text-secondary);
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 1.5rem;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .article-date {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .article-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .article-tag {
            background: rgba(0, 212, 255, 0.1);
            color: var(--secondary-color);
            padding: 0.25rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-top: auto;
            transition: gap 0.3s ease;
        }

        .read-more:hover {
            gap: 1rem;
        }

        /* 页脚 */
        .footer {
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 3rem 2rem;
            margin-top: 5rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--primary-color);
        }

        .footer-copyright {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .hero-subtitle {
                font-size: 1.25rem;
            }

            .nav-links {
                display: none;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .categories-grid,
            .articles-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">TechHub</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#categories">分类</a></li>
                <li><a href="#articles">文章</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <section class="hero-section" id="home">
        <div class="hero-container">
            <div class="hero-badge">🚀 技术前沿</div>
            <h1 class="hero-title">探索技术的无限可能</h1>
            <p class="hero-subtitle">
                在 TechHub，我们分享最新的技术趋势、实用的开发工具和深入的编程教程
            </p>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">11+</div>
                    <div class="stat-label">精选文章</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">5</div>
                    <div class="stat-label">技术分类</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">100%</div>
                    <div class="stat-label">原创内容</div>
                </div>
            </div>
        </div>
    </section>

  
    <!-- 最新文章 -->
    <section class="articles-section" id="articles">
        <div class="section-header">
            <h2 class="section-title">最新文章</h2>
            <p class="section-subtitle">发现最新的技术分享和教程</p>
        </div>

        <div class="articles-grid" id="articlesGrid">
            <!-- 文章将通过 JavaScript 动态加载 -->
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer" id="about">
        <div class="footer-content">
            <div class="footer-links">
                <a href="https://github.com" target="_blank">GitHub</a>
                <a href="mailto:contact@techhub.com">联系我们</a>
                <a href="#">RSS 订阅</a>
            </div>
            <p class="footer-copyright">
                © 2024 TechHub. All rights reserved.
            </p>
        </div>
    </footer>

    <script>
        // 加载文章数据
        async function loadArticles() {
            try {
                const response = await fetch('/data/articles.json');
                const data = await response.json();

                // 加载文章
                loadArticles(data.articles);
            } catch (error) {
                console.error('加载文章失败:', error);
            }
        }

        // 加载最新文章（显示前6篇）
        function loadArticles(articles) {
            const articlesGrid = document.getElementById('articlesGrid');
            const latestArticles = articles.slice(0, 6);

            latestArticles.forEach(article => {
                const card = document.createElement('div');
                card.className = 'article-card';

                card.innerHTML = `
                    <h3 class="article-title">${article.title}</h3>
                    <p class="article-description">${article.description}</p>
                `;

                // 点击卡片跳转到文章
                card.addEventListener('click', () => {
                    window.location.href = `/${article.htmlFile}`;
                });

                articlesGrid.appendChild(card);
            });
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', loadArticles);

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
