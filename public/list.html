<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - TechHub</title>
    <meta name="description" content="浏览 TechHub 的所有技术文章，涵盖 AI、前端、工具等多个领域。">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0066ff;
            --secondary-color: #00d4ff;
            --accent-color: #ff6b00;
            --dark-bg: #0a0e27;
            --card-bg: #1a1f3a;
            --text-color: #e8eaed;
            --text-secondary: #9aa0a6;
            --border-color: #2a2f4a;
            --success-color: #00c853;
            --warning-color: #ff9800;
            --info-color: #0ea5e9;
            --error-color: #ef4444;
            --gradient-primary: linear-gradient(135deg, #0066ff 0%, #00d4ff 100%);
            --gradient-hero: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            --shadow-glow: 0 0 30px rgba(0, 102, 255, 0.3);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary-color);
        }

        /* 主要内容区域 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            flex-grow: 1;
        }

        /* 页面标题 */
        .page-header {
            margin-bottom: 3rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1.125rem;
        }

        /* 文章网格 */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .article-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .article-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .article-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-glow);
        }

        .article-card:hover::before {
            transform: scaleX(1);
        }

        .article-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .article-description {
            color: var(--text-secondary);
            line-height: 1.6;
            flex-grow: 1;
        }

        /* 页脚 */
        .footer {
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 2rem;
            margin-top: auto;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .footer-copyright {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* 返回顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary-color);
            color: white;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            background: var(--secondary-color);
            transform: translateY(-5px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">TechHub</a>
            <ul class="nav-links">
                <li><a href="/">首页</a></li>
                <li><a href="/list.html" class="active">文章列表</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="main-container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">所有文章</h1>
            <p class="page-subtitle">浏览所有技术文章</p>
        </div>

        <!-- 文章网格 -->
        <div class="articles-grid" id="articlesGrid">
            <!-- 文章卡片将通过 JavaScript 动态加载 -->
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-copyright">
                © 2024 TechHub. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- 返回顶部按钮 -->
    <div class="back-to-top" id="backToTop">↑</div>

    <script>
        // 加载文章数据
        async function loadArticles() {
            try {
                const response = await fetch('/data/articles.json');
                const data = await response.json();
                const articles = data.articles;

                displayArticles(articles);
            } catch (error) {
                console.error('加载文章失败:', error);
            }
        }

        // 显示文章列表
        function displayArticles(articles) {
            const articlesGrid = document.getElementById('articlesGrid');
            articlesGrid.innerHTML = '';

            articles.forEach(article => {
                const card = createArticleCard(article);
                articlesGrid.appendChild(card);
            });
        }

        // 创建文章卡片
        function createArticleCard(article) {
            const card = document.createElement('div');
            card.className = 'article-card';

            card.innerHTML = `
                <h3 class="article-title">${article.title}</h3>
                <p class="article-description">${article.description}</p>
            `;

            // 点击卡片跳转到文章
            card.addEventListener('click', () => {
                window.location.href = `/${article.htmlFile}`;
            });

            return card;
        }

        // 返回顶部功能
        function initBackToTop() {
            const backToTop = document.getElementById('backToTop');

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });

            backToTop.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadArticles();
            initBackToTop();
        });
    </script>
</body>
</html>
