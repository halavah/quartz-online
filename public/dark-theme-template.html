<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章标题</title>
    <meta name="description" content="文章描述">
    <meta name="keywords" content="关键词">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0066ff;
            --secondary-color: #00d4ff;
            --accent-color: #ff6b00;
            --dark-bg: #0a0e27;
            --card-bg: #1a1f3a;
            --text-color: #e8eaed;
            --text-secondary: #9aa0a6;
            --border-color: #2a2f4a;
            --success-color: #00c853;
            --gradient-primary: linear-gradient(135deg, #0066ff 0%, #00d4ff 100%);
            --gradient-hero: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            --shadow-glow: 0 0 30px rgba(0, 102, 255, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--dark-bg);
            overflow-x: hidden;
        }

        /* 英雄区域 */
        .hero-section {
            background: var(--gradient-hero);
            padding: 6rem 2rem 4rem;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(0, 102, 255, 0.2);
            color: var(--secondary-color);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(0, 212, 255, 0.3);
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 主要内容区域 */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* 文章正文 */
        .article-content {
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        /* 标题样式 */
        h1, h2, h3, h4, h5, h6 {
            color: var(--text-color);
            margin: 2rem 0 1rem;
            font-weight: 600;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 2.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h3 {
            font-size: 2rem;
        }

        h4 {
            font-size: 1.5rem;
        }

        /* 段落样式 */
        p {
            margin-bottom: 1.5rem;
        }

        /* 列表样式 */
        ul, ol {
            margin: 1.5rem 0;
            padding-left: 2rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-glow);
        }

        /* 代码块样式 */
        code {
            background: rgba(0, 102, 255, 0.1);
            color: var(--secondary-color);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.9em;
        }

        pre {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        pre code {
            background: none;
            color: var(--text-color);
            padding: 0;
        }

        /* 引用样式 */
        blockquote {
            background: rgba(0, 102, 255, 0.1);
            border-left: 4px solid var(--primary-color);
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: var(--text-color);
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: rgba(0, 102, 255, 0.1);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* 链接样式 */
        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        /* 强调文本 */
        strong {
            color: var(--text-color);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .hero-subtitle {
                font-size: 1.25rem;
            }

            h1 { font-size: 2.5rem; }
            h2 { font-size: 2rem; }
            h3 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- 英雄区域 -->
    <section class="hero-section">
        <div class="hero-container">
            <div class="hero-badge">技术标签</div>
            <h1 class="hero-title">文章标题</h1>
            <p class="hero-subtitle">
                文章副标题或简介，简要介绍文章内容和价值
            </p>
        </div>
    </section>

    <!-- 主要内容 -->
    <main class="main-content">
        <div class="article-content">
            <!-- 这里放置文章内容 -->
            <h2>章节标题</h2>
            <p>这里是段落内容...</p>

            <div class="card">
                <h3>卡片标题</h3>
                <p>卡片内容，用于突出重要信息</p>
            </div>

            <h3>子章节标题</h3>
            <ul>
                <li>列表项 1</li>
                <li>列表项 2</li>
                <li>列表项 3</li>
            </ul>

            <blockquote>
                "引用内容，用于强调重要观点或引用他人言论"
            </blockquote>

            <pre><code>// 代码示例
function example() {
    console.log("Hello, World!");
}</code></pre>
        </div>
    </main>
</body>
</html>
